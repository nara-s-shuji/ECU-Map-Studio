<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ECU Map Studio 2026</title>
    <!-- Cache-busting scripts -->
    <script src="lib/plotly.min.js"></script>
    <link rel="stylesheet" href="css/style.css?v=2026.8">
    <style>
        :root { --accent: #0078d4; --panel: #252526; }

        /* 1. Global Reset & Layout */
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; overflow: hidden; /* Prevent body scroll */
            color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top); /* Push content below status bar */
        }

        /* 2. Top UI */
        #toolbar { height: 44px; display: flex; align-items: center; background: #222; border-bottom: 1px solid #333; padding: 0 10px; flex-shrink: 0; }
        #mobile-info-bar { height: 32px; display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 0 15px; font-size: 11px; flex-shrink: 0; }
        .toolbar-btn { background: transparent; border: none; font-size: 18px; color: #ccc; cursor: pointer; padding: 5px; }

        /* 3. Main Container & Map View */
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #map-section {
            flex: 1; overflow: auto; background: #000;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 200px; /* Space for popup at bottom */
        }
        
        #table-wrapper { position: relative; display: flex; flex-direction: column; width: max-content; }

        /* 4. GRID RECONSTRUCTION (1 + 27 = 28 Columns) */
        .header-row, .grid-container {
            display: grid !important;
            grid-template-columns: 80px repeat(27, 60px) !important;
            gap: 1px !important;
            background: #333 !important;
            width: max-content !important;
        }
        
        /* Fixed Header Stacking */
        .header-row {
            position: sticky; top: 0; z-index: 50; /* Ensure it stays above grid content */
            height: 30px; line-height: 30px; background: #2d2d2d !important;
        }
        
        .grid-container { margin-top: 0 !important; } /* No overlap if header is block child */

        .cell { font-size: 14px !important; min-height: 32px !important; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; position: relative; }
        .label-cell, .header-cell { background: #2d2d2d !important; color: #fff !important; font-size: 11px !important; z-index: 10; font-weight: bold; }
        .label-cell { position: sticky; left: 0; z-index: 50 !important; } /* Sticky Left TPS labels */

        /* 5. POPUP (Absolute Visibility Fix) */
        #edit-popup-v2 {
            position: fixed;
            bottom: calc(70px + env(safe-area-inset-bottom));
            left: 2%; width: 96%; height: 62px;
            background: #111; border: 2.5px solid var(--accent) !important;
            border-radius: 14px; box-shadow: 0 10px 50px rgba(0,0,0,1);
            z-index: 99999 !important;
            display: none; align-items: center; justify-content: center;
        }
        #edit-popup-v2.active { display: flex !important; visibility: visible !important; opacity: 1 !important; }

        .popup-controls { display: flex; width: 100%; gap: 6px; padding: 0 10px; align-items: center; }
        .popup-btn { flex: 1; background: #333; border: 1px solid #444; color: #fff; height: 46px; border-radius: 8px; font-size: 20px; font-weight: bold; }
        .popup-btn:active { background: #555; transform: scale(0.95); }
        #btn-apply-minus, #btn-apply-plus { flex: 1.5; font-size: 32px; color: #0078d4; }
        .delta-ui { flex: 2; height: 46px; background: #000; border-radius: 8px; border: 1px solid #666; display: flex; align-items: center; justify-content: space-around; }
        #popup-delta { background: transparent; border: none; color: #fff; font-size: 18px; width: 45px; text-align: center; }

        /* 6. Bottom Navigation */
        #bottom-nav {
            height: 56px; background: #222; border-top: 1px solid #333;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 10000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #888; font-size: 10px; border: none; background: transparent; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon-main { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>

<body>
    <!-- Top UI -->
    <div id="toolbar">
        <button class="toolbar-btn" onclick="document.getElementById('file-input').click()">📂</button>
        <button class="toolbar-btn" id="btn-save-top">💾</button>
        <button class="toolbar-btn" id="btn-undo">↶</button>
        <button class="toolbar-btn" id="btn-redo">↷</button>
        <div style="flex:1"></div>
        <button class="toolbar-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <!-- Info Bar with CACHE BUSTING text -->
    <div id="mobile-info-bar">
        <span id="info-filename" style="color:var(--accent); font-weight:bold;">v2026.8_FORCE_RELOAD</span>
        <span id="info-values">POPUP HIGH-Z FIX</span>
    </div>

    <!-- Scrollable Map -->
    <div id="main-container">
        <div id="editor-view" class="view-section active">
            <div id="map-section">
                <div id="table-wrapper">
                    <div id="headerRow" class="header-row"></div>
                    <div id="mapGrid" class="grid-container"></div>
                </div>
            </div>
        </div>
        <!-- Other views logic remains in JS -->
    </div>

    <!-- ⚡️ FIXED POPUP UPSTAIRS ⚡️ -->
    <div id="edit-popup-v2">
        <div class="popup-controls">
            <button class="popup-btn" style="flex:0.6; font-size:16px;" onclick="resetToOriginal()">Reset</button>
            <button class="popup-btn" id="btn-apply-minus" onmousedown="startApply(-1, event)" ontouchstart="startApply(-1, event)">-</button>
            <div class="delta-ui">
                <button class="toolbar-btn" style="color:#888;" onmousedown="startSpinner(-1, event)" ontouchstart="startSpinner(-1, event)">▽</button>
                <input type="number" id="popup-delta" value="10" readonly>
                <button class="toolbar-btn" style="color:#888;" onmousedown="startSpinner(1, event)" ontouchstart="startSpinner(1, event)">△</button>
            </div>
            <button class="popup-btn" id="btn-apply-plus" onmousedown="startApply(1, event)" ontouchstart="startApply(1, event)">+</button>
            <button class="popup-btn" id="btn-mode-toggle" style="flex:0.7; font-size:12px; color:var(--accent);" onclick="togglePopupMode()">ABS</button>
        </div>
    </div>

    <!-- Bottom UI -->
    <div id="bottom-nav">
        <button class="nav-item" onclick="switchTab('file')"><span class="nav-icon-main">📁</span><span>ファイル</span></button>
        <button class="nav-item active" onclick="switchTab('editor')"><span class="nav-icon-main">📝</span><span>編集</span></button>
        <button class="nav-item" onclick="switchTab('graph')"><span class="nav-icon-main">📊</span><span>グラフ</span></button>
        <button class="nav-item" onclick="switchTab('monitor')"><span class="nav-icon-main">⏱️</span><span>モニター</span></button>
        <button class="nav-item" onclick="toggleSettings()"><span class="nav-icon-main">☰</span><span>設定</span></button>
    </div>

    <!-- Overlays -->
    <div id="settings-menu" style="display:none; position:fixed; top:44px; right:0; width:280px; height:100%; background:#222; z-index:999999; padding:20px; border-left:1px solid #444;">
        <h3 style="margin-top:0;">Settings <button style="float:right;" onclick="toggleSettings(false)">×</button></h3>
        <button style="width:100%; padding:15px; margin-bottom:10px; background:var(--accent); border:none; color:#fff; border-radius:4px;" onclick="location.reload(true)">🔄 強制リロード (Clear Cache)</button>
        <select id="cell-color-mode" style="width:100%; background:#333; color:white; padding:10px;">
            <option value="diff">Diff (差分表示)</option>
            <option value="absolute">Absolute (全値表示)</option>
        </select>
    </div>

    <input type="file" id="file-input" style="display:none;" accept=".csv">
    <script src="js/app.js?v=2026.8" type="module"></script>
</body>
</html>
