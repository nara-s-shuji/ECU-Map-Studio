<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ECU Map Studio 2026</title>
    <script src="lib/plotly.min.js"></script>
    <link rel="stylesheet" href="css/style.css?v=2026.7">
    <style>
        :root { --accent: #0078d4; --panel: #252526; --border: #333; }

        /* 1. Reset & Global Layout */
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; overflow: hidden; /* Prevent body scroll */
            color: #fff;
        }

        body {
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top); /* Matches iOS status bar */
        }

        /* 2. Top UI (Toolbar & Info) */
        #toolbar { height: 44px; display: flex; align-items: center; background: #222; border-bottom: 1px solid #333; flex-shrink: 0; padding: 0 10px; }
        #mobile-info-bar { height: 32px; display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; padding: 0 15px; font-size: 11px; flex-shrink: 0; }
        .toolbar-btn { background: transparent; border: none; font-size: 18px; color: #ccc; cursor: pointer; padding: 5px; }

        /* 3. Main View Area (Map) */
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #map-section {
            flex: 1; overflow: auto; background: #000;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 150px; /* Essential for popup space */
        }
        #table-wrapper { position: relative; display: flex; flex-direction: column; width: max-content; }

        /* 4. Grid Constraints (1 label + 27 data = 28) */
        .header-row, .grid-container {
            display: grid !important;
            grid-template-columns: 80px repeat(27, 60px) !important;
            gap: 1px !important;
            background: #333 !important;
            width: max-content !important;
            border-bottom: 1px solid #333 !important;
        }
        
        .header-row { position: sticky; top: 0; z-index: 2000; height: 30px; background: #2d2d2d !important; }
        .grid-container { margin-top: 0 !important; } 
        .cell { font-size: 14px !important; min-height: 32px !important; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; }
        .label-cell, .header-cell { background: #2d2d2d !important; color: #fff !important; font-size: 11px !important; }

        /* 5. FIX POPUP (Forced Centering & Z-Index) */
        #edit-popup-v2 {
            position: fixed;
            bottom: calc(65px + env(safe-area-inset-bottom)); /* Specifically above bottom-nav */
            left: 5%; width: 90%; height: 60px;
            background: #111; border: 2px solid var(--accent);
            border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,1);
            z-index: 99999 !important; /* Top most */
            display: none; align-items: center; justify-content: center; padding: 0 5px;
        }
        #edit-popup-v2.active { display: flex !important; }

        .popup-controls { display: flex; width: 100%; gap: 5px; align-items: center; }
        .popup-btn { flex: 1; background: #333; border: 1px solid #444; color: #fff; height: 48px; border-radius: 8px; font-size: 20px; font-weight: bold; }
        #btn-apply-minus, #btn-apply-plus { flex: 1.5; font-size: 30px; }
        .delta-group { flex: 2; height: 48px; background: #000; border-radius: 8px; border: 1px solid #555; display: flex; align-items: center; justify-content: space-around; overflow: hidden; }
        #popup-delta { background: transparent; border: none; color: #fff; font-size: 18px; width: 40px; text-align: center; }

        /* 6. Bottom Nav Bar */
        #bottom-nav {
            height: 54px; background: #222; border-top: 1px solid #333;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 50000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; background: transparent; border: none; color: #777; font-size: 10px; padding: 5px 0; }
        .nav-item.active { color: var(--accent); }
        .nav-icon-font { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div id="toolbar">
        <button class="toolbar-btn" onclick="document.getElementById('file-input').click()">📂</button>
        <button class="toolbar-btn" id="btn-save-top">💾</button>
        <button class="toolbar-btn" id="btn-undo">↶</button>
        <button class="toolbar-btn" id="btn-redo">↷</button>
        <div style="flex:1"></div>
        <button class="toolbar-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <!-- Info Bar with Debug Version -->
    <div id="mobile-info-bar">
        <span id="info-filename">v2026.7_POPUP_FORCE</span>
        <span id="info-values">0% ROW & POPUP FIX</span>
    </div>

    <!-- Main Content -->
    <div id="main-container">
        <!-- Editor View -->
        <div id="editor-view" class="view-section active">
            <div id="map-section">
                <div id="table-wrapper">
                    <div id="headerRow" class="header-row"></div>
                    <div id="mapGrid" class="grid-container"></div>
                </div>
            </div>
        </div>

        <!-- Hidden Views (Dynamic) -->
        <div id="file-view" class="view-section" style="padding:20px; overflow-y:auto;">
            <h3>Files</h3>
            <div id="explorer-list"></div>
        </div>
    </div>

    <!-- 🧨 EDIT POPUP 🧨 -->
    <div id="edit-popup-v2">
        <div class="popup-controls">
            <button class="popup-btn" style="flex:0.6; font-size:16px;" onclick="resetToOriginal()">Reset</button>
            <button class="popup-btn" id="btn-apply-minus" onmousedown="startApply(-1, event)" ontouchstart="startApply(-1, event)">-</button>
            <div class="delta-group">
                <button class="toolbar-btn" onmousedown="startSpinner(-1, event)" ontouchstart="startSpinner(-1, event)">▽</button>
                <input type="number" id="popup-delta" value="10" readonly>
                <button class="toolbar-btn" onmousedown="startSpinner(1, event)" ontouchstart="startSpinner(1, event)">△</button>
            </div>
            <button class="popup-btn" id="btn-apply-plus" onmousedown="startApply(1, event)" ontouchstart="startApply(1, event)">+</button>
            <button class="popup-btn" id="btn-mode-toggle" style="flex:0.7; font-size:12px; color:var(--accent);" onclick="togglePopupMode()">ABS</button>
        </div>
    </div>

    <!-- Bottom Menu -->
    <div id="bottom-nav">
        <button class="nav-item" onclick="switchTab('file')"><span class="nav-icon-font">📁</span><span>ファイル</span></button>
        <button class="nav-item active" onclick="switchTab('editor')"><span class="nav-icon-font">📝</span><span>編集</span></button>
        <button class="nav-item" onclick="switchTab('graph')"><span class="nav-icon-font">📊</span><span>グラフ</span></button>
        <button class="nav-item" onclick="switchTab('monitor')"><span class="nav-icon-font">⏱️</span><span>モニター</span></button>
        <button class="nav-item" onclick="toggleSettings()"><span class="nav-icon-font">☰</span><span>設定</span></button>
    </div>

    <!-- Overlays -->
    <div id="settings-menu" style="display:none; position:fixed; top:40px; right:0; width:300px; height:calc(100% - 40px); background:#252526; z-index:999999; padding:20px; border-left:1px solid #3c3c3c;">
        <h3 style="margin:0 0 15px 0;">Settings <button style="float:right;" onclick="toggleSettings(false)">×</button></h3>
        <select id="cell-color-mode" style="width:100%; background:#333; color:white; padding:10px;">
            <option value="diff">Diff (比較/差分)</option>
            <option value="absolute">Absolute (絶対値)</option>
        </select>
        <button style="width:100%; padding:15px; margin-top:20px;" onclick="location.reload()">🔄 Reload App</button>
    </div>

    <input type="file" id="file-input" style="display:none;" accept=".csv">
    <script src="js/app.js" type="module"></script>
</body>
</html>
