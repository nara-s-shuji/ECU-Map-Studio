<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ECU Map Studio 2026</title>
    <!-- Offline Plotly Library -->
    <script src="lib/plotly.min.js"></script>
    <link rel="stylesheet" href="css/style.css?v=2026.4">
    <style>
        /* MOBILE OPTIMIZATIONS & FIXES */
        :root {
            --accent: #0078d4;
            --border: #3c3c3c;
            --nav-bg: #2d2d30;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            overflow: hidden;
        }

        /* Essential Grid Fix: Match state.js (27 columns) */
        .header-row, .grid-container {
            display: grid !important;
            grid-template-columns: 80px repeat(27, 60px) !important;
            width: max-content !important;
            background: #333 !important;
            gap: 1px !important;
        }

        /* Popup Styles */
        #edit-popup-v2 {
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            max-width: 500px;
            height: 64px;
            background: #252526;
            border: 1px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            z-index: 20000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            box-sizing: border-box;
            touch-action: none;
        }
        #edit-popup-v2.active { display: flex !important; }

        .popup-controls { display: flex; width: 100%; height: 100%; align-items: center; gap: 8px; justify-content: space-around; }
        .popup-btn {
            background: #333; border: 1px solid #444; color: white;
            height: 48px; min-width: 44px; border-radius: 8px;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; flex: 1;
        }
        #btn-apply-minus, #btn-apply-plus { max-width: 80px; font-weight: bold; font-size: 24px; color: #fff; }
        
        .delta-spinner-group {
            display: flex; align-items: center; background: #000;
            border-radius: 8px; height: 48px; flex: 1.5; max-width: 140px; border: 1px solid #444;
        }
        .spinner-adjust-btn { flex: 1; height: 100%; background: transparent; border: none; color: #888; font-size: 14px; }
        #popup-delta { width: 40px; background: transparent; border: none; color: white; text-align: center; font-size: 16px; font-family: 'Consolas', monospace; }

        /* Navigation Fixes */
        #bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: #2d2d30; border-top: 1px solid #3c3c3c;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 10000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #888; font-size: 10px; background: transparent; border: none; width: 20%; height: 100%;
        }
        .nav-item.active { color: var(--accent); }
        .nav-font-icon { font-size: 20px; margin-bottom: 2px; }

        /* Table & Spacing */
        #mobile-info-bar {
            height: 34px; background: #2d2d30; border-bottom: 1px solid #3c3c3c;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; font-size: 11px; flex-shrink: 0;
        }
        #map-section { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; background: #000; }
        
        /* Ensure cells look right */
        .cell { min-height: 30px !important; }
        .header-cell, .label-cell { background: #2d2d2d !important; font-weight: bold; }
    </style>
</head>

<body>
    <!-- 1. Toolbar -->
    <div id="toolbar" style="height:44px; flex-shrink:0;">
        <button class="toolbar-btn" data-tooltip="保存" id="btn-save-top">💾</button>
        <button class="toolbar-btn" id="btn-undo" data-tooltip="元に戻す">↶</button>
        <button class="toolbar-btn" id="btn-redo" data-tooltip="やり直し">↷</button>
        <div style="flex:1"></div>
        <button class="toolbar-btn" id="btn-settings" data-tooltip="設定">⚙️</button>
    </div>

    <!-- 2. Main Container -->
    <div id="main-container" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <!-- Editor View -->
        <div id="editor-view" class="view-section active" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
            <div id="mobile-info-bar">
                <span id="info-filename">New_Map.csv</span>
                <span id="debug-info" style="font-size:9px; color:#555; background:#000; padding:2px 4px; border-radius:3px;">v2026.4_FINAL_LAYOUT</span>
                <span id="info-values">Curr: - / Orig: -</span>
            </div>
            <div id="map-section">
                <div id="table-wrapper">
                    <div id="headerRow" class="header-row"></div>
                    <div id="mapGrid" class="grid-container"></div>
                </div>
                <div style="height: 120px;"></div> <!-- Spacer -->
            </div>
        </div>

        <!-- File View -->
        <div id="file-view" class="view-section" style="display:none; padding:20px; overflow-y:auto;">
            <h3>Project Explorer</h3>
            <div id="explorer-list" class="file-list"></div>
        </div>

        <!-- Graph View -->
        <div id="graph-view" class="view-section" style="display:none; flex-direction:column; height:100%;">
            <div id="chart-container" style="flex:1;"></div>
        </div>

        <!-- Monitor View -->
        <div id="monitor-view" class="view-section" style="display:none; overflow-y:auto;">
            <div class="monitor-grid" id="monitor-grid"></div>
        </div>
    </div>

    <!-- 3. Edit Popup (v2) -->
    <div id="edit-popup-v2">
        <div class="popup-controls">
            <button class="popup-btn" style="flex:0.5; min-width:40px;" title="Reset" onclick="resetToOriginal()">↺</button>
            <button class="popup-btn" id="btn-apply-minus">-</button>
            <div class="delta-spinner-group">
                <button class="spinner-adjust-btn">▽</button>
                <input type="number" id="popup-delta" value="10" readonly>
                <button class="spinner-adjust-btn">△</button>
            </div>
            <button class="popup-btn" id="btn-apply-plus">+</button>
            <button class="popup-btn" id="btn-mode-toggle" style="flex:0.6; font-size:12px; color:var(--accent);" onclick="togglePopupMode()">ABS</button>
        </div>
    </div>

    <!-- 4. Bottom Navigation -->
    <div id="bottom-nav">
        <button class="nav-item" id="nav-file">
            <span class="nav-font-icon">📁</span>
            <span>ファイル</span>
        </button>
        <button class="nav-item active" id="nav-editor">
            <span class="nav-font-icon">📝</span>
            <span>編集</span>
        </button>
        <button class="nav-item" id="nav-graph">
            <span class="nav-icon nav-font-icon">📊</span>
            <span>グラフ</span>
        </button>
        <button class="nav-item" id="nav-monitor">
            <span class="nav-icon nav-font-icon">⏱️</span>
            <span>モニター</span>
        </button>
        <button class="nav-item" id="nav-menu">
            <span class="nav-icon nav-font-icon">☰</span>
            <span>設定</span>
        </button>
    </div>

    <!-- 5. Overlays -->
    <div id="settings-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; z-index:24000;"></div>
    <div id="settings-menu" style="display:none; position:fixed; top:44px; right:0; width:300px; height:calc(100% - 44px); background:#252526; z-index:25000; padding:20px; border-left:1px solid #3c3c3c;">
        <div class="settings-content">
            <h3>Settings <button style="float:right; background:none; border:none; color:#888; font-size:24px;" onclick="toggleSettings(false)">×</button></h3>
            <div class="setting-item">
                <label style="display:block; margin-bottom:5px; font-size:12px; color:#888;">Cell Coloring Mode:</label>
                <select id="cell-color-mode" style="width:100%; background:#333; color:white; border:1px solid #555; padding:8px;">
                    <option value="diff">Diff (比較/差分)</option>
                    <option value="absolute">Absolute (絶対値)</option>
                </select>
            </div>
            <hr style="border-color:#444; margin:20px 0;">
            <button class="menu-item" style="width:100%; padding:12px; margin-bottom:10px;" id="btn-menu-open">📂 Open CSV File...</button>
            <button class="menu-item" style="width:100%; padding:12px;" onclick="location.reload()">🔄 Reload App</button>
        </div>
    </div>

    <input type="file" id="file-input" style="display:none;" accept=".csv">
    <input type="file" id="base-file-input" style="display:none;" accept=".csv">

    <script src="js/app.js" type="module"></script>
</body>
</html>
