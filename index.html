<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ECU Map Studio 2026</title>
    <!-- Offline Plotly Library -->
    <script src="lib/plotly.min.js"></script>
    <link rel="stylesheet" href="css/style.css?v=2026.2">
    <style>
        /* MINIMAL OVERRIDES FOR MOBILE POPUP & NAV */
        #edit-popup-v2 {
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 500px;
            height: 62px;
            background: #252526;
            border: 1px solid var(--accent);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            z-index: 20000;
            display: none;
            align-items: center;
            justify-content: center;
            touch-action: none;
            padding: 0 10px;
            box-sizing: border-box;
        }
        #edit-popup-v2.active { display: flex !important; }

        .popup-controls { display: flex; width: 100%; height: 100%; align-items: center; gap: 8px; justify-content: space-around; }
        .popup-btn {
            background: #333; border: 1px solid #444; color: white;
            height: 48px; min-width: 44px; border-radius: 8px;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none;
        }
        #btn-apply-minus, #btn-apply-plus { flex: 1; max-width: 80px; font-weight: bold; font-size: 24px; }
        
        .delta-spinner-group {
            display: flex; align-items: center; background: #000;
            border-radius: 8px; height: 48px; flex: 1; max-width: 120px; border: 1px solid #444;
        }
        .spinner-adjust-btn { flex: 1; height: 100%; background: transparent; border: none; color: #888; font-size: 14px; }
        #popup-delta { width: 50px; background: transparent; border: none; color: white; text-align: center; font-size: 16px; font-family: 'Consolas', monospace; }

        /* Bottom Nav Fix */
        #bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: #2d2d30; border-top: 1px solid #3c3c3c;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 10000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #888; font-size: 10px; background: transparent; border: none; width: 20%; height: 100%;
        }
        .nav-item.active { color: var(--accent); }
        .nav-i-icon { font-size: 20px; margin-bottom: 2px; }

        /* Fix Header Spacing (Conflicted in previous turn) */
        .header-row, .grid-container {
            grid-template-columns: 80px repeat(11, 70px) !important; /* Adjust if data has more cols */
            width: max-content !important;
        }
        @media (min-width: 1024px) {
            .header-row, .grid-container { grid-template-columns: 80px repeat(27, 60px) !important; }
        }

        /* Mobile Info Bar */
        #mobile-info-bar {
            height: 32px; background: #2d2d30; border-bottom: 1px solid #3c3c3c;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; font-size: 11px; z-index: 1000;
        }
    </style>
</head>

<body style="overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; background: #1e1e1e;">
    <!-- 1. Toolbar -->
    <div id="toolbar">
        <button class="toolbar-btn" data-tooltip="保存" id="btn-save-top">💾</button>
        <button class="toolbar-btn" id="btn-undo" data-tooltip="元に戻す">↶</button>
        <button class="toolbar-btn" id="btn-redo" data-tooltip="やり直し">↷</button>
        <div style="flex:1"></div>
        <button class="toolbar-btn" id="btn-settings" data-tooltip="設定">⚙️</button>
    </div>

    <!-- 2. Main Container -->
    <div id="main-container">
        <!-- Editor View -->
        <div id="editor-view" class="view-section active" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
            <div id="mobile-info-bar">
                <span id="info-filename">New_Map.csv</span>
                <span id="debug-info" style="font-size:9px; color:#555; background:#000; padding:2px 4px; border-radius:3px;">v2026.3_LAYOUT_FIX</span>
                <span id="info-values">Curr: - / Orig: -</span>
            </div>
            <div id="map-section" style="flex:1; overflow:auto; -webkit-overflow-scrolling: touch; background:#000;">
                <div id="table-wrapper">
                    <div id="headerRow" class="header-row"></div>
                    <div id="mapGrid" class="grid-container"></div>
                </div>
                <div style="height: 120px;"></div> <!-- Spacer -->
            </div>
        </div>

        <!-- Other Views (Managed by navigation.js) -->
        <div id="file-view" class="view-section" style="display:none; padding:20px; overflow-y:auto;">
            <h3>Project Files</h3>
            <div id="explorer-list" class="file-list"></div>
        </div>
        <div id="graph-view" class="view-section" style="display:none; flex-direction:column; height:100%;">
            <div style="padding:10px; border-bottom:1px solid #3c3c3c;">Graph View</div>
            <div id="chart-container" style="flex:1;"></div>
        </div>
        <div id="monitor-view" class="view-section" style="display:none; overflow-y:auto;">
            <div class="monitor-grid" id="monitor-grid"></div>
        </div>
    </div>

    <!-- 3. Edit Popup (v2) -->
    <div id="edit-popup-v2">
        <div class="popup-controls">
            <button class="popup-btn" style="width:40px;" title="Reset" onclick="resetToOriginal()">↺</button>
            <button class="popup-btn" id="btn-apply-minus">-</button>
            <div class="delta-spinner-group">
                <button class="spinner-adjust-btn">▽</button>
                <input type="number" id="popup-delta" value="10" readonly>
                <button class="spinner-adjust-btn">△</button>
            </div>
            <button class="popup-btn" id="btn-apply-plus">+</button>
            <button class="popup-btn" id="btn-mode-toggle" style="font-size:12px; width:45px;" onclick="togglePopupMode()">ABS</button>
        </div>
    </div>

    <!-- 4. Bottom Navigation -->
    <div id="bottom-nav">
        <button class="nav-item" id="nav-file">
            <span class="nav-i-icon">📁</span>
            <span>ファイル</span>
        </button>
        <button class="nav-item active" id="nav-editor">
            <span class="nav-i-icon">📝</span>
            <span>編集</span>
        </button>
        <button class="nav-item" id="nav-graph">
            <span class="nav-i-icon">📊</span>
            <span>グラフ</span>
        </button>
        <button class="nav-item" id="nav-monitor">
            <span class="nav-i-icon">⏱️</span>
            <span>モニター</span>
        </button>
        <button class="nav-item" id="nav-menu">
            <span class="nav-i-icon">☰</span>
            <span>設定</span>
        </button>
    </div>

    <!-- 5. Overlays -->
    <div id="settings-overlay"></div>
    <div id="settings-menu" style="display:none; position:fixed; top:40px; right:0; width:280px; height:calc(100% - 40px); background:#252526; z-index:25000; padding:20px; border-left:1px solid #3c3c3c;">
        <div class="settings-content">
            <h3>Settings <button style="float:right; background:none; border:none; color:#888; font-size:20px;" onclick="toggleSettings(false)">×</button></h3>
            <div class="setting-item">
                <label>Coloring: </label>
                <select id="cell-color-mode" style="width:100%; background:#3c3c3c; color:white; border:1px solid #555; padding:5px;">
                    <option value="diff">Diff (差分)</option>
                    <option value="absolute">Absolute (絶対値)</option>
                </select>
            </div>
            <hr style="border-color:#444; margin:15px 0;">
            <button class="menu-item" style="width:100%; padding:10px; margin-bottom:5px;" id="btn-menu-open">📂 Open File</button>
            <button class="menu-item" style="width:100%; padding:10px;" onclick="location.reload()">🔄 Reload</button>
        </div>
    </div>

    <input type="file" id="file-input" style="display:none;" accept=".csv">
    <input type="file" id="base-file-input" style="display:none;" accept=".csv">

    <script src="js/app.js" type="module"></script>
</body>
</html>
