<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ECU Map Studio 2026</title>
    <!-- Aggressive Cache Busting -->
    <script src="lib/plotly.min.js"></script>
    <link rel="stylesheet" href="css/style.css?v=2026.9_FINAL">
    <style>
        :root { --accent: #0078d4; --panel: #1e1e1e; --border: #333; }

        /* 1. Global Reset & Layout (Fixes Black Band & Overlap) */
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; overflow: hidden; /* No body scroll */
            color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            display: flex; flex-direction: column;
            padding-top: env(safe-area-inset-top); /* Matches iOS notch/status bar */
        }

        /* 2. Top Navigation (NO GAPS) */
        #toolbar {
            height: 44px; display: flex; align-items: center; background: #2d2d30;
            border-bottom: 1px solid #3c3c3c; padding: 0 10px; flex-shrink: 0; margin:0;
        }
        #mobile-info-bar {
            height: 32px; display: flex; align-items: center; justify-content: space-between;
            background: #111; padding: 0 15px; font-size: 11px; flex-shrink: 0; margin:0;
            border-bottom: 1px solid #222;
        }
        .toolbar-btn { background: transparent; border: none; font-size: 18px; color: #ccc; cursor: pointer; padding: 8px; }

        /* 3. Map View Area (Robust Stacking) */
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .view-section { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .view-section.active { display: flex; }

        #map-section {
            flex: 1; overflow: auto; background: #000;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 150px; /* Space for popup */
        }
        
        /* The container that actually scrolls */
        #table-wrapper {
            position: relative; display: flex; flex-direction: column;
            width: max-content; padding: 0; margin: 0;
            background: #000;
        }

        /* 4. GRID RE-FIX (Sync Header with Data) */
        .header-row, .grid-container {
            display: grid !important;
            grid-template-columns: 80px repeat(27, 60px) !important;
            gap: 1px !important;
            background: #333 !important; /* Grid line color */
            width: max-content !important;
        }
        
        .header-row {
            position: sticky; top: 0; z-index: 5000; /* Must be high */
            height: 32px; line-height: 32px; background: #2d2d2d !important;
            border-bottom: 2px solid #555;
        }
        
        .grid-container { margin: 0 !important; z-index: 10; }

        .cell { font-size: 14px !important; height: 34px !important; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; }
        .label-cell, .header-cell { background: #2d2d2d !important; color: #fff !important; font-size: 11px !important; font-weight: bold; }
        .label-cell { position: sticky; left: 0; z-index: 2000 !important; border-right: 2px solid #555; }

        /* 5. POPUP (Absolute Visibility - Fixed to Screen Bottom) */
        #edit-popup-v2 {
            position: fixed;
            bottom: calc(65px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%);
            width: 94%; max-width: 500px; height: 60px;
            background: #111; border: 2.5px solid var(--accent);
            border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,1);
            z-index: 999999 !important; /* Top of the world */
            display: none; align-items: center; justify-content: center;
        }
        #edit-popup-v2.active { display: flex !important; visibility: visible !important; opacity: 1 !important; }

        .popup-controls { display: flex; width: 100%; gap: 6px; padding: 0 8px; align-items: center; }
        .popup-btn { flex: 1; background: #333; border: 1px solid #444; color: #fff; height: 46px; border-radius: 8px; font-size: 20px; }
        #btn-apply-minus, #btn-apply-plus { flex: 1.4; font-size: 30px; font-weight: bold; }
        .delta-box { flex: 2; height: 46px; background: #000; border-radius: 8px; border: 1px solid #555; display: flex; align-items: center; justify-content: space-around; overflow: hidden; }
        #popup-delta { background: transparent; border: none; color: #fff; font-size: 18px; width: 40px; text-align: center; font-family: monospace; }
        
        /* 6. Bottom Navigation (Fixes URL Bar) */
        #bottom-nav {
            height: 56px; background: #252526; border-top: 1px solid #3c3c3c;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100000;
        }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; background: transparent; border: none; color: #888; font-size: 10px; }
        .nav-link.active { color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }

        /* 🧨 DEBUG / VERSIONING 🧨 */
        #debug-version-tag { color: var(--accent); font-weight: bold; margin-right: 5px; }
    </style>
</head>

<body>
    <!-- 1. Top Navbar -->
    <div id="toolbar">
        <button class="toolbar-btn" onclick="document.getElementById('file-input').click()">📂</button>
        <button class="toolbar-btn" id="btn-save-top">💾</button>
        <button class="toolbar-btn" id="btn-undo">↶</button>
        <button class="toolbar-btn" id="btn-redo">↷</button>
        <div style="flex:1"></div>
        <button class="toolbar-btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <!-- 2. Info/Status Bar -->
    <div id="mobile-info-bar">
        <span><span id="debug-version-tag">ACTUAL_v2026.9</span> <span id="info-filename">Loading...</span></span>
        <span id="info-values">C: - / O: -</span>
    </div>

    <!-- 3. Primary Content -->
    <div id="main-container">
        <!-- Editor View -->
        <div id="editor-view" class="view-section active">
            <div id="map-section">
                <!-- Wrapper for Grid + Sticky Header -->
                <div id="table-wrapper">
                    <!-- horizontal RPM labels. Must be first. -->
                    <div id="headerRow" class="header-row"></div>
                    <!-- The grid content (0% to 100%) -->
                    <div id="mapGrid" class="grid-container"></div>
                </div>
            </div>
        </div>

        <!-- File View -->
        <div id="file-view" class="view-section" style="padding:20px; overflow-y:auto;">
            <h3>Project Files</h3>
            <div id="explorer-list"></div>
        </div>
    </div>

    <!-- 4. MODAL POPUP (FIXED) -->
    <div id="edit-popup-v2">
        <div class="popup-controls">
            <button class="popup-btn" style="flex:0.6; font-size:16px;" onclick="resetToOriginal()">Reset</button>
            <button class="popup-btn" id="btn-apply-minus" onmousedown="startApply(-1, event)" ontouchstart="startApply(-1, event)">-</button>
            <div class="delta-box">
                <button class="toolbar-btn" style="color:#888;" onmousedown="startSpinner(-1, event)" ontouchstart="startSpinner(-1, event)">▽</button>
                <input type="number" id="popup-delta" value="10" readonly>
                <button class="toolbar-btn" style="color:#888;" onmousedown="startSpinner(1, event)" ontouchstart="startSpinner(1, event)">△</button>
            </div>
            <button class="popup-btn" id="btn-apply-plus" onmousedown="startApply(1, event)" ontouchstart="startApply(1, event)">+</button>
            <button class="popup-btn" id="btn-mode-toggle" style="flex:0.7; font-size:12px; color:var(--accent);" onclick="togglePopupMode()">ABS</button>
        </div>
    </div>

    <!-- 5. Navigation Bar -->
    <div id="bottom-nav">
        <button class="nav-link" onclick="switchTab('file')"><span class="nav-icon">📁</span><span>ファイル</span></button>
        <button class="nav-link active" onclick="switchTab('editor')"><span class="nav-icon">📝</span><span>編集</span></button>
        <button class="nav-link" onclick="switchTab('graph')"><span class="nav-icon">📊</span><span>グラフ</span></button>
        <button class="nav-link" onclick="switchTab('monitor')"><span class="nav-icon">⏱️</span><span>モニター</span></button>
        <button class="nav-link" onclick="toggleSettings()"><span class="nav-icon">☰</span><span>設定</span></button>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-menu" style="display:none; position:fixed; top:0; right:0; width:300px; height:100%; background:#111; z-index:9999999; padding:20px; border-left:1px solid #444;">
        <h3 style="margin:0 0 15px 0;">Settings <button style="float:right; border:none; background:none; color:#888; font-size:24px;" onclick="toggleSettings(false)">×</button></h3>
        <button style="width:100%; padding:15px; margin-bottom:10px; background:var(--accent); border:none; color:white; border-radius:8px;" onclick="location.reload(true)">🔄 FULL RELOAD (CACHE CLEAR)</button>
        <p style="font-size:10px; color:#666;">Version: ACTUAL_v2026.9_CLEAN_HEADER</p>
    </div>

    <input type="file" id="file-input" style="display:none;" accept=".csv">
    <script src="js/app.js?v=2026.9_FINAL" type="module"></script>
</body>
</html>
