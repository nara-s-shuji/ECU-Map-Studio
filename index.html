<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ECU Map Studio 2026</title>
    <!-- Aggressive Cache Busting -->
    <script src="lib/plotly.min.js"></script>
    <link rel="stylesheet" href="css/style.css?v=2026.12">
    <style>
        :root { --accent: #0078d4; --bg: #000; --panel: #1e1e1e; }

        /* 1. Global Layout (Zero Gaps) */
        html, body {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); overflow: hidden;
            color: #fff; font-family: -apple-system, sans-serif;
        }
        body { display: flex; flex-direction: column; padding-top: env(safe-area-inset-top); }

        /* 2. Top Navigation (Minimal) */
        #mobile-info-bar { height: 32px; display: flex; align-items: center; justify-content: space-between; background: #111; padding: 0 15px; font-size: 11px; flex-shrink: 0; border-bottom: 1px solid #222; }
        .toolbar-btn { background: transparent; border: none; font-size: 18px; color: #ccc; cursor: pointer; padding: 8px; }

        /* 3. Map Viewport */
        #main-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #map-section {
            flex: 1; overflow: auto; background: #000;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 150px;
        }
        
        #table-wrapper { position: relative; display: block; width: max-content; }

        /* 4. GRID RECONSTRUCTION */
        .header-row, .grid-container {
            display: grid !important;
            grid-template-columns: 80px repeat(27, 60px) !important;
            gap: 1px !important;
            background: #333 !important;
            width: max-content !important;
        }
        
        /* Sticky Horizontal Header */
        .header-row {
            position: sticky; top: 0; z-index: 10000 !important;
            height: 32px; line-height: 32px; background: #222 !important;
        }
        
        .grid-container { position: relative; z-index: 1; margin: 0 !important; }

        .cell { height: 34px !important; background: #fff; color: #000; font-size: 14px; display: flex; align-items: center; justify-content: center; position: relative; }
        .label-cell, .header-cell { background: #222 !important; color: #fff !important; font-size: 11px; font-weight: bold; }
        
        /* Sticky Vertical Labels */
        .label-cell { position: sticky; left: 0; z-index: 5000 !important; border-right: 2px solid #444; }
        
        /* Sticky Corner (Top-Left) */
        .corner-cell { position: sticky !important; left: 0 !important; top: 0 !important; z-index: 15000 !important; background: #333 !important; border-right: 2px solid #666; border-bottom: 2px solid #666; }

        /* 5. POPUP (Absolute Visibility) */
        #edit-popup-v2 {
            position: fixed;
            bottom: calc(75px + env(safe-area-inset-bottom));
            left: 50%; transform: translateX(-50%);
            width: 96%; max-width: 480px; height: 60px;
            background: #111; border: 2.5px solid var(--accent);
            border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,1);
            z-index: 999999 !important;
            display: none; align-items: center; justify-content: center;
        }
        #edit-popup-v2.active { display: flex !important; visibility: visible !important; opacity: 1 !important; }

        .popup-controls { display: flex; width: 100%; gap: 6px; padding: 0 10px; }
        .popup-btn { flex: 1; background: #333; border: 1px solid #444; color: #fff; height: 44px; border-radius: 8px; font-size: 20px; font-weight: bold; }
        #btn-apply-minus, #btn-apply-plus { flex: 1.5; color: var(--accent); }
        .delta-ui { flex: 2; height: 44px; background: #000; border-radius: 8px; border: 1px solid #555; display: flex; align-items: center; justify-content: space-around; }
        #popup-delta { background: transparent; border: none; color: #fff; font-size: 18px; width: 40px; text-align: center; }

        /* 6. Navigation */
        #bottom-nav {
            height: 56px; background: #1a1a1a; border-top: 1px solid #333;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 500000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; color: #888; font-size: 10px; border: none; background: transparent; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }

        #debug-tag { color: var(--accent); font-weight: bold; margin-right: 5px; }
    </style>
</head>

<body>
    <!-- 1. Info Bar (Top Bar removed) -->
    <div id="mobile-info-bar">
        <span><span id="debug-tag">FINAL_v2026.12</span> <span id="info-filename">Loading...</span></span>
        <span id="info-values">C:- / O:-</span>
    </div>

    <!-- 2. Main -->
    <div id="main-container">
        <div id="editor-view" class="view-section active">
            <div id="map-section">
                <div id="table-wrapper">
                    <div id="headerRow" class="header-row"></div>
                    <div id="mapGrid" class="grid-container"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. Edit Popup (Fixed Spinner & Stop Listeners) -->
    <div id="edit-popup-v2">
        <div class="popup-controls">
            <button class="popup-btn" style="flex:0.6; font-size:14px;" onclick="resetToOriginal()">Reset</button>
            <button class="popup-btn" id="btn-apply-minus" 
                    onmousedown="startApply(-1, event)" onmouseup="stopApply()" onmouseleave="stopApply()" 
                    ontouchstart="startApply(-1, event)" ontouchend="stopApply()">-</button>
            <div class="delta-ui">
                <button class="toolbar-btn" 
                        onmousedown="startSpinner(-1, event)" onmouseup="stopSpinner()" onmouseleave="stopSpinner()" 
                        ontouchstart="startSpinner(-1, event)" ontouchend="stopSpinner()">▽</button>
                <input type="number" id="popup-delta" value="10" readonly>
                <button class="toolbar-btn" 
                        onmousedown="startSpinner(1, event)" onmouseup="stopSpinner()" onmouseleave="stopSpinner()" 
                        ontouchstart="startSpinner(1, event)" ontouchend="stopSpinner()">△</button>
            </div>
            <button class="popup-btn" id="btn-apply-plus" 
                    onmousedown="startApply(1, event)" onmouseup="stopApply()" onmouseleave="stopApply()" 
                    ontouchstart="startApply(1, event)" ontouchend="stopApply()">+</button>
            <button class="popup-btn" id="btn-mode-toggle" style="flex:0.7; font-size:12px; color:var(--accent);" onclick="togglePopupMode()">ABS</button>
        </div>
    </div>

    <!-- 4. Navigation -->
    <div id="bottom-nav">
        <button class="nav-item" onclick="switchTab('file')"><span class="nav-icon">📁</span><span>ファイル</span></button>
        <button class="nav-item active" onclick="switchTab('editor')"><span class="nav-icon">📝</span><span>編集</span></button>
        <button class="nav-item" onclick="switchTab('graph')"><span class="nav-icon">📊</span><span>グラフ</span></button>
        <button class="nav-item" onclick="switchTab('monitor')"><span class="nav-icon">⏱️</span><span>モニター</span></button>
        <button class="nav-item" onclick="toggleSettings()"><span class="nav-icon">☰</span><span>設定</span></button>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-menu" style="display:none; position:fixed; top:0; right:0; width:300px; height:100%; background:#111; z-index:9999999; padding:20px; border-left:1px solid #444;">
        <h3 style="margin-top:0;">Settings <button style="float:right;" onclick="toggleSettings(false)">×</button></h3>
        <button style="width:100%; padding:15px; margin-bottom:10px; background:var(--accent); border:none; color:white; border-radius:8px;" onclick="location.reload(true)">🔄 FULL RELOAD (CACHE CLEAR)</button>
        <p style="margin-top:20px; font-size:12px; color:#aaa;">File Actions:</p>
        <button style="width:100%; padding:10px; margin-bottom:10px; background:#333; border:1px solid #555; color:white; border-radius:4px;" onclick="document.getElementById('file-input').click()">📂 Open CSV</button>
        <button style="width:100%; padding:10px; margin-bottom:10px; background:#333; border:1px solid #555; color:white; border-radius:4px;" onclick="saveFileToCSV()">💾 Save CSV</button>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button style="flex:1; padding:10px; background:#333; border:1px solid #555; color:white; border-radius:4px;" onclick="undo()">↶ Undo</button>
            <button style="flex:1; padding:10px; background:#333; border:1px solid #555; color:white; border-radius:4px;" onclick="redo()">↷ Redo</button>
        </div>
        <p style="margin-top:30px; font-size:10px; color:#666;">Version: 2026.12_STABLE_FIXES</p>
    </div>

    <script src="js/app.js?v=2026.12" type="module"></script>
    <input type="file" id="file-input" style="display:none;" accept=".csv">
</body>
</html>
